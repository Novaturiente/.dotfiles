impl: http://github.com/blend-os/tracks/raw/main
arch-repo: https://geo.mirror.pkgbuild.com
repo: https://pkg-repo.blendos.co

track: blendos-base

packages:
  # Base System
   - linux                          # Arch Linux kernel
   - linux-headers                  # Header files for building kernel modules
   - inetutils                      # Basic networking utilities like ping, hostname
   - xorg-xauth                     # X authentication utility
   - file                           # Determines file type
   - cpio                           # Tool to copy files to/from archives
   - pciutils                       # Tools for PCI devices
   - usbutils                       # Tools for USB devices
   - openssl                        # Toolkit for SSL/TLS encryption
   - pacman-contrib                 # Pacman system scripts
   - tlp                            # Power profile management

  # Networking
   - networkmanager                 # Network connection manager
   - network-manager-applet         # GUI applet for NetworkManager
   - bluez                          # Bluetooth protocol stack
   - bluez-tools                    # CLI utilities for BlueZ
   - blueman                        # GTK Bluetooth manager
   - bluez-utils                    # Additional utilities for BlueZ
   - kdeconnect                     # Integrates phone with desktop (via network)

   - wireplumber                    # PipeWire session manager
   - pipewire-pulse                 # PulseAudio compatibility layer for PipeWire
   - pipewire                       # Modern multimedia server

  # Display & Graphics
   - nvidia-dkms                    # NVIDIA driver (DKMS version)
   - nvidia-utils                   # NVIDIA driver utilities
   - nvidia-settings                # NVIDIA Configuration tool
   - nvidia-prime                   # NVDIA Prime offload
   - nvidia-container-toolkit       # NVIDIA container runtime support
   - lib32-nvidia-utils             # 32-bit NVIDIA utilities for multilib apps
   - lib32-libglvnd                 # 32-bit OpenGL vendor-neutral dispatch
   - lib32-gnutls                   # 32-bit SSL/TLS library
   - gdk-pixbuf2                    # Image loading library used by GTK
   - vulkan-tools                   # Vulkan development tools
   - vulkan-icd-loader              # Vulkan loader
   - lib32-vulkan-icd-loader        # 32-bit Vulkan loader
   - vulkan-intel                   # Vulkan drivers for Intel GPUs
   - lib32-vulkan-intel             # 32-bit Intel Vulkan drivers
   - xf86-video-intel               # Intel GPU driver
   - xorg-xwayland                  # XWayland for running X apps in Wayland
   - bbswitch                       # Kernel module to switch graphics card

  # Window Management & Compositors
   - hyprland                   # Dynamic tiling Wayland compositor
   - hyprpolkitagent                # Polkit authentication agent for Hyprland
   - ly                             # TUI display manager
   - rofi-wayland                   # Launcher for Wayland (Rofi fork)
   - waybar                         # Customizable Wayland status bar
   - swww                           # Wallpaper daemon for Wayland
   - swayosd-git                    # On-screen display for audio/brightness keys
   - waypaper-git                   # Wallpaper setter for Wayland

   - xdg-user-dirs                  # Manage user directories 
   - xdg-desktop-portal             # Desktop integration portal for sandboxed apps
   - xdg-desktop-portal-hyprland    # Hyprland backend for xdg-desktop-portal

  # Utilities
   - playerctl                      # Control media players via CLI
   - wl-clipboard                   # Clipboard utilities for Wayland
   - grim                           # Screenshot utility for Wayland
   - slurp                          # Select region for grim
   - swappy                         # GUI image annotator for screenshots
   - zenity                         # Display GTK dialogs from shell scripts
   - brightnessctl                  # CLI to control screen brightness
   - clipman                        # Clipboard manager for Wayland

  # Appearance
   - ttf-jetbrains-mono-nerd        # JetBrains Mono Nerd Font
   - ttf-sourcecodepro-nerd         # Source Code Pro Nerd Font
   - ttf-firacode-nerd              # Fira Code Nerd Font
   - ttf-roboto-mono-nerd           # Roboto Mono Nerd Font
   - orchis-theme                   # GTK theme
   - nwg-look                       # GTK appearance configuration utility
   - qt6ct                          # Configure Qt6 application themes

  # File Management
   - krusader                           # TUI file manager

  # Shells
   - fish                           # User-friendly shell

  # Terminal Emulators
   - ghostty                        # GPU-accelerated terminal emulator
   - kitty                          # Fast, GPU-based terminal emulator

  # System Monitoring
   - btop                           # Resource monitor with a modern UI
   - nvtop                          # Monitor NVIDIA GPU usage
   - powertop                       # Monitor power usage
   - fastfetch                      # System info fetch tool

  # Command Line Tools
   - eza                            # Modern replacement for `ls`
   - zoxide                         # Smarter `cd` command
   - ripgrep                        # Fast search tool (grep alternative)
   - duf                            # Disk usage viewer
   - stow                           # Symlink manager for dotfiles
   - jq                             # CLI JSON processor

  # Text Editors
   - neovim                         # Modern fork of Vim

  # Package & Application Management
   - flatpak                        # Universal application packaging system
   - protonup-qt                    # GUI tool to manage Proton versions
   - distrobox                      # Run any Linux distro in containers

  # Virtualization
   - gnome-boxes                    # Gnome Boxes
   - docker                         # Container engine
   - docker-compose                 # Define and run multi-container apps

  # Development
   - cmake                          # Cross-platform build system
   - meson                          # Build system optimized for speed
   - cpio                           # Archive tool (also used in initramfs)
   - pkg-config                     # Manage compile/link flags for libraries
   - tree-sitter                    # Incremental parsing system
   - nodejs                         # JavaScript runtime
   - npm                            # Node.js package manager
   - lua                            # Lightweight scripting language
   - lua51                          # Lua 5.1 version
   - luarocks                       # Package manager for Lua modules
   - gcc                            # GNU Compiler Collection
   - go                             # Go programming language
   - cargo                          # Rust package manager and build tool
   - rust-analyzer                  # LSP server for Rust
   - rustfmt                        # Rust code formatter
   - python-pip                     # Python package installer
   - python-pynvim                  # Python support for Neovim plugins
   - uv                             # Python package manager (fast pip alternative)
   - pyright                        # Static type checker for Python
   - cuda                           # NVIDIA CUDA toolkit
   - cuda-tools                     # Developer tools for CUDA
   - cudnn                          # Deep neural network library for CUDA
   - fd                             # Fast, user-friendly `find` alternative

  # Compatibility
   - lutris                         # Game manager for Wine, etc.
   - wine-staging                   #Gaming Main Wine environment
   - giflib                         #Gaming Image support
   - lib32-giflib                   #Gaming 32-bit version
   - libpng                         #Gaming Needed for textures/images
   - lib32-libpng                   #Gaming 32-bit version
   - gnutls                         #Gaming Required for secure network protocols
   - mpg123                         #Gaming MP3 audio decoder
   - lib32-mpg123                   #Gaming 32-bit audio support
   - openal                         #Gaming 3D positional audio
   - lib32-openal                   #Gaming 32-bit audio
   - libpulse                       #Gaming PulseAudio sup(even if using PipeWire)
   - lib32-libpulse                 #Gaming 32-bit PulseAudio
   - libgpg-error                   #Gaming Required for crypto
   - lib32-libgpg-error             #Gaming 32-bit
   - alsa-plugins                   #Gaming ALSA sound plugins
   - lib32-alsa-plugins             #Gaming 32-bit ALSA
   - alsa-lib                       #Gaming Core ALSA support
   - lib32-alsa-lib                 #Gaming 32-bit
   - sqlite                         #Gaming Used by some launchers and game clients
   - lib32-sqlite                   #Gaming 32-bit
   - libxcomposite                  #Gaming Needed for compositing in X11
   - lib32-libxcomposite            #Gaming 32-bit
   - libgcrypt                      #Gaming Crypto library
   - lib32-libgcrypt                #Gaming 32-bit
   - ncurses                        #Gaming Text interface (used by Wine apps)
   - lib32-ncurses                  #Gaming 32-bit
   - libva                          #Gaming Video acceleration
   - lib32-libva                    #Gaming 32-bit
   - gtk3                           #Gaming GUI support
   - lib32-gtk3                     #Gaming 32-bit
   - gst-plugins-base-libs          #Gaming Multimedia support
   - lib32-gst-plugins-base-libs    #Gaming 32-bit

  # File Transfer
   - sshfs                          # Mount remote filesystems over SSH

  # Web Browsers
   - qutebrowser                    # Web browser
   - python-adblock

  # Archiving and Compression
   - gzip                           # File compression tool
   - unzip                          # Extract ZIP files
   - unrar                          # Extract RAR files
   - 7zip                           # High-compression archive tool

  # Download Managers
   - wget                           # Command-line file downloader

  # Network Tools
   - nmap                           # Network scanning and security auditing
   - curl                           # Transfer data from or to a server
   - qbittorrent                    # BitTorrent client

  # Media players
   - mpv                            # MPV player

aur-packages:
  - fish-done
  - fish-fzf

services:
  - ly
  - docker
  - flatpak
  - tlp

package-repos:
  - name: 'chaotic-aur'
    repo-url: 'https://geo-mirror.chaotic.cx/$repo/$arch'
